<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  .game-container {
    position: relative;
    border: 3px solid #333;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,255,0,0.15), 0 0 80px rgba(0,255,0,0.05);
  }
  canvas {
    display: block;
    border-radius: 5px;
  }
  .hud {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    color: #0f0;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,0,0.5);
  }
  .hud span { margin: 0 8px; }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    border-radius: 5px;
    pointer-events: all;
  }
  .overlay h1 {
    color: #0f0;
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0,255,0,0.7);
  }
  .overlay h2 {
    color: #ff0;
    font-size: 24px;
    margin-bottom: 6px;
    text-shadow: 0 0 15px rgba(255,255,0,0.7);
  }
  .overlay p {
    color: #aaa;
    font-size: 14px;
    margin: 4px 0;
  }
  .overlay button {
    margin-top: 20px;
    padding: 12px 40px;
    font-size: 20px;
    font-family: inherit;
    font-weight: bold;
    background: #0a0;
    color: #0f0;
    border: 2px solid #0f0;
    border-radius: 6px;
    cursor: pointer;
    text-shadow: 0 0 10px rgba(0,255,0,0.5);
    box-shadow: 0 0 20px rgba(0,255,0,0.3);
    transition: all 0.2s;
  }
  .overlay button:hover {
    background: #0c0;
    box-shadow: 0 0 40px rgba(0,255,0,0.5);
    transform: scale(1.05);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="game-container" id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div class="hud" id="hud">
    <span>❤️ <span id="lives">3</span></span>
    <span>🎯 <span id="score">0</span></span>
    <span>🏆 第 <span id="level">1</span> 关</span>
    <span>💀 <span id="kills">0</span></span>
  </div>
  <div class="overlay" id="startScreen">
    <h1>🎮 坦克大战</h1>
    <h2>TANK BATTLE</h2>
    <p>WASD / 方向键 — 移动坦克</p>
    <p>空格 / J — 发射炮弹</p>
    <p>消灭所有敌方坦克过关</p>
    <button onclick="startGame()">开始游戏</button>
  </div>
  <div class="overlay hidden" id="gameOverScreen">
    <h2 id="gameOverTitle">游戏结束</h2>
    <p>最终得分: <span id="finalScore">0</span></p>
    <p>消灭坦克: <span id="finalKills">0</span></p>
    <button onclick="restartGame()">再来一局</button>
  </div>
  <div class="overlay hidden" id="levelScreen">
    <h2 id="levelTitle">第 2 关</h2>
    <p>准备迎战更多敌人!</p>
    <button onclick="startLevel()">开始</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game dimensions
const COLS = 26;
const ROWS = 26;
const CELL = 28;
const W = COLS * CELL;
const H = ROWS * CELL;

canvas.width = W;
canvas.height = H;

// Game state
let gameState = 'start'; // start | playing | levelComplete | gameOver
let score = 0;
let lives = 3;
let level = 1;
let kills = 0;
let player = null;
let enemies = [];
let bullets = [];
let particles = [];
let walls = [];
let powerUps = [];
let shakeTimer = 0;
let shakeIntensity = 0;
let keys = {};
let spawnTimer = 0;
let frameCount = 0;

// Input
const KEY_MAP = {
  'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
  'w': 'up', 'W': 'up', 's': 'down', 'S': 'down', 'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right',
  ' ': 'fire', 'j': 'fire', 'J': 'fire', 'Enter': 'fire',
};

// ========== Classes ==========

class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x;          // grid x
    this.y = y;          // grid y
    this.px = x * CELL;  // pixel x (for smooth movement)
    this.py = y * CELL;
    this.dir = dir;      // 0=up 1=right 2=down 3=left
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 2.5 : 1.2 + level * 0.2;
    this.cooldown = 0;
    this.cooldownMax = isPlayer ? 18 : 55 - level * 3;
    this.alive = true;
    this.hp = isPlayer ? 3 : 1;
    this.aiTimer = 0;
    this.aiChangeDir = 60 + Math.random() * 120;
    this.flashTimer = 0;
    this.invincible = isPlayer ? 90 : 0;
  }

  move(dx, dy) {
    const newX = this.x + dx;
    const newY = this.y + dy;
    if (this.canMoveTo(newX, newY)) {
      this.x = newX;
      this.y = newY;
      return true;
    }
    // Try sliding along walls
    if (dx !== 0 && this.canMoveTo(newX, this.y)) {
      this.x = newX;
      return true;
    }
    if (dy !== 0 && this.canMoveTo(this.x, newY)) {
      this.y = newY;
      return true;
    }
    return false;
  }

  canMoveTo(gx, gy) {
    if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) return false;
    // Check walls
    for (const w of walls) {
      if (w.x === gx && w.y === gy && !w.destroyed) return false;
    }
    // Check other tanks
    const allTanks = this.isPlayer ? enemies : [player, ...enemies];
    for (const t of allTanks) {
      if (t === this || !t.alive) continue;
      if (t.x === gx && t.y === gy) return false;
    }
    return true;
  }

  shoot() {
    if (this.cooldown > 0) return null;
    this.cooldown = this.cooldownMax;
    const bx = this.x + [0, 1, 0, -1][this.dir] * 0.9;
    const by = this.y + [-1, 0, 1, 0][this.dir] * 0.9;
    return new Bullet(bx, by, this.dir, this.isPlayer);
  }

  update() {
    if (this.cooldown > 0) this.cooldown--;
    if (this.invincible > 0) this.invincible--;
    if (this.flashTimer > 0) this.flashTimer--;
    // Smooth pixel movement
    const targetX = this.x * CELL + CELL / 2;
    const targetY = this.y * CELL + CELL / 2;
    this.px += (targetX - this.px) * 0.3;
    this.py += (targetY - this.py) * 0.3;
  }

  draw(ctx) {
    if (!this.alive) return;
    if (this.flashTimer > 0 && Math.floor(this.flashTimer / 3) % 2 === 0) return;

    const cx = this.px;
    const cy = this.py;
    const r = CELL / 2 - 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((this.dir * Math.PI) / 2);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(-r + 2, -r + 2, r * 2, r * 2);

    // Body
    const grad = ctx.createLinearGradient(-r, -r, r, r);
    grad.addColorStop(0, this.color);
    grad.addColorStop(1, this.isPlayer ? '#004400' : '#440000');
    ctx.fillStyle = grad;
    ctx.fillRect(-r, -r, r * 2, r * 2);

    // Border
    ctx.strokeStyle = this.isPlayer ? '#0f0' : '#f44';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-r, -r, r * 2, r * 2);

    // Treads
    ctx.fillStyle = '#222';
    ctx.fillRect(-r - 3, -r, 4, r * 2);
    ctx.fillRect(r - 1, -r, 4, r * 2);

    // Tread marks
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    for (let i = -r + 3; i < r; i += 4) {
      ctx.beginPath();
      ctx.moveTo(-r - 3, i);
      ctx.lineTo(-r + 1, i);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(r - 1, i);
      ctx.lineTo(r + 3, i);
      ctx.stroke();
    }

    // Turret
    ctx.fillStyle = this.isPlayer ? '#5f5' : '#f88';
    ctx.fillRect(-4, -r - 6, 8, r + 2);

    // Barrel
    ctx.fillStyle = '#888';
    ctx.fillRect(-2, -r - 12, 4, 8);

    // Invincible shield
    if (this.invincible > 0) {
      ctx.strokeStyle = `rgba(255,255,255,${0.3 + Math.sin(Date.now()/50)*0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r + 6, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  }

  hit(dmg = 1) {
    if (this.invincible > 0) return false;
    this.hp -= dmg;
    this.flashTimer = 12;
    if (this.hp <= 0) {
      this.alive = false;
      return true;
    }
    return false;
  }
}

class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.speed = 5;
    this.alive = true;
    this.trail = [];
  }

  update() {
    this.trail.push({ x: this.x, y: this.y, life: 4 });
    if (this.trail.length > 6) this.trail.shift();
    for (const t of this.trail) t.life--;

    this.x += [0, 1, 0, -1][this.dir] * (this.speed / CELL);
    this.y += [-1, 0, 1, 0][this.dir] * (this.speed / CELL);

    const gx = Math.round(this.x);
    const gy = Math.round(this.y);

    // Out of bounds
    if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) {
      this.alive = false;
      spawnBoom(this.x, this.y, '#ff0', 4);
      return;
    }

    // Walls
    for (const w of walls) {
      if (w.destroyed) continue;
      if (w.x === gx && w.y === gy) {
        w.destroyed = true;
        this.alive = false;
        spawnBoom(gx + 0.5, gy + 0.5, '#f80', 8);
        shakeTimer = 5;
        shakeIntensity = 2;
        return;
      }
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    // Trail
    for (const t of this.trail) {
      const alpha = t.life / 6;
      ctx.fillStyle = this.isPlayer
        ? `rgba(255,255,100,${alpha * 0.5})`
        : `rgba(255,100,100,${alpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(t.x * CELL, t.y * CELL, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Bullet
    const px = this.x * CELL;
    const py = this.y * CELL;
    ctx.fillStyle = this.isPlayer ? '#ff0' : '#f44';
    ctx.shadowColor = this.isPlayer ? '#ff0' : '#f44';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

class Particle {
  constructor(x, y, vx, vy, color, life) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.life--;
    return this.life > 0;
  }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    const size = 2 + (this.life / this.maxLife) * 3;
    ctx.fillStyle = this.color.replace('1)', `${alpha})`).replace('rgb', 'rgba');
    ctx.beginPath();
    ctx.arc(this.x * CELL, this.y * CELL, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

class PowerUp {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type; // 'heal' | 'speed' | 'rapid'
    this.life = 600;
    this.alive = true;
  }

  update() {
    this.life--;
    if (this.life <= 0) this.alive = false;
    // Flash when about to expire
    if (this.life < 120 && Math.floor(this.life / 15) % 2 === 0) return;
  }

  draw(ctx) {
    if (!this.alive) return;
    const px = this.x * CELL + CELL / 2;
    const py = this.y * CELL + CELL / 2;
    const colors = { heal: '#0f0', speed: '#0ff', rapid: '#f0f' };
    const symbols = { heal: '❤️', speed: '⚡', rapid: '🔥' };

    ctx.fillStyle = colors[this.type];
    ctx.shadowColor = colors[this.type];
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(px, py, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbols[this.type], px, py);
  }
}

// ========== Helpers ==========

function spawnBoom(gx, gy, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = 0.03 + Math.random() * 0.12;
    particles.push(new Particle(
      gx, gy,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      color,
      15 + Math.random() * 20
    ));
  }
}

function spawnEnemy() {
  const edges = [];
  // Top edge
  for (let x = 0; x < COLS; x++) {
    if (!walls.some(w => w.x === x && w.y === 0 && !w.destroyed))
      edges.push({ x, y: 0, dir: 1 }); // going right along top
  }
  // Bottom edge
  for (let x = 0; x < COLS; x++) {
    if (!walls.some(w => w.x === x && w.y === ROWS - 1 && !w.destroyed))
      edges.push({ x, y: ROWS - 1, dir: 3 });
  }
  // Left edge
  for (let y = 0; y < ROWS; y++) {
    if (!walls.some(w => w.x === 0 && w.y === y && !w.destroyed))
      edges.push({ x: 0, y, dir: 2 });
  }
  // Right edge
  for (let y = 0; y < ROWS; y++) {
    if (!walls.some(w => w.x === COLS - 1 && w.y === y && !w.destroyed))
      edges.push({ x: COLS - 1, y, dir: 0 });
  }

  if (edges.length === 0) return null;

  const spawn = edges[Math.floor(Math.random() * edges.length)];
  // Check not occupied
  const allTanks = player.alive ? [player, ...enemies] : enemies;
  if (allTanks.some(t => t.alive && t.x === spawn.x && t.y === spawn.y)) return null;

  const colors = ['#e44', '#e84', '#c4c', '#4cc', '#e4e'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const enemy = new Tank(spawn.x, spawn.y, Math.floor(Math.random() * 4), color);
  enemy.speed = 1.0 + level * 0.15 + Math.random() * 1.5;
  enemy.cooldownMax = Math.max(20, 65 - level * 4 + Math.floor(Math.random() * 30));
  return enemy;
}

function checkCollisions() {
  // Player bullets vs enemies
  for (const b of bullets) {
    if (!b.alive || !b.isPlayer) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      if (Math.abs(dx) < 0.8 && Math.abs(dy) < 0.8) {
        b.alive = false;
        const killed = e.hit(1);
        spawnBoom(e.x + 0.5, e.y + 0.5, '#f80', 10);
        if (killed) {
          kills++;
          score += 100 * level;
          spawnBoom(e.x + 0.5, e.y + 0.5, '#f44', 20);
          shakeTimer = 8;
          shakeIntensity = 4;
          // Random power-up drop
          if (Math.random() < 0.2) {
            const types = ['heal', 'speed', 'rapid'];
            powerUps.push(new PowerUp(e.x, e.y, types[Math.floor(Math.random() * 3)]));
          }
        }
        break;
      }
    }
  }

  // Enemy bullets vs player
  for (const b of bullets) {
    if (!b.alive || b.isPlayer) continue;
    if (!player.alive) continue;
    const dx = b.x - player.x;
    const dy = b.y - player.y;
    if (Math.abs(dx) < 0.8 && Math.abs(dy) < 0.8) {
      b.alive = false;
      const killed = player.hit(1);
      spawnBoom(player.x + 0.5, player.y + 0.5, '#ff0', 10);
      if (killed) {
        lives--;
        spawnBoom(player.x + 0.5, player.y + 0.5, '#0f0', 30);
        shakeTimer = 15;
        shakeIntensity = 6;
        if (lives <= 0) {
          gameOver(false);
        } else {
          respawnPlayer();
        }
      }
    }
  }

  // Power-ups vs player
  if (player.alive) {
    for (const p of powerUps) {
      if (!p.alive) continue;
      if (p.x === player.x && p.y === player.y) {
        p.alive = false;
        if (p.type === 'heal') {
          player.hp = Math.min(player.hp + 1, 5);
        } else if (p.type === 'speed') {
          player.speed = Math.min(player.speed + 0.5, 5);
          setTimeout(() => { if (player.alive) player.speed = Math.max(2.5, player.speed - 0.5); }, 10000);
        } else if (p.type === 'rapid') {
          player.cooldownMax = Math.max(6, player.cooldownMax - 6);
          setTimeout(() => { if (player.alive) player.cooldownMax = Math.min(30, player.cooldownMax + 6); }, 10000);
        }
        spawnBoom(p.x + 0.5, p.y + 0.5, '#fff', 6);
      }
    }
  }
}

function respawnPlayer() {
  // Find safe spawn near center
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS - 2);
  for (let r = 0; r < 10; r++) {
    const sx = cx + (Math.random() - 0.5) * r * 2;
    const sy = cy - r;
    const gx = Math.round(sx);
    const gy = Math.round(sy);
    if (gx >= 0 && gy >= 0 && gx < COLS && gy < ROWS) {
      const blocked = walls.some(w => w.x === gx && w.y === gy && !w.destroyed) ||
        enemies.some(e => e.alive && e.x === gx && e.y === gy);
      if (!blocked) {
        player.x = gx;
        player.y = gy;
        player.px = gx * CELL;
        player.py = gy * CELL;
        player.alive = true;
        player.hp = 3;
        player.invincible = 120;
        player.dir = 0;
        player.cooldown = 0;
        return;
      }
    }
  }
  // Fallback
  player.x = cx;
  player.y = cy;
  player.px = cx * CELL;
  player.py = cy * CELL;
  player.alive = true;
  player.hp = 3;
  player.invincible = 120;
  player.dir = 0;
  player.cooldown = 0;
}

function generateLevel() {
  walls = [];
  powerUps = [];
  enemies = [];
  bullets = [];
  particles = [];

  // Border walls (with gaps for spawns)
  for (let x = 0; x < COLS; x++) {
    if (x !== 0 && x !== COLS - 1 && Math.random() > 0.85) continue; // gaps in border
    walls.push({ x, y: 0, destroyed: false });
    walls.push({ x, y: ROWS - 1, destroyed: false });
  }
  for (let y = 0; y < ROWS; y++) {
    if (y !== 0 && y !== ROWS - 1 && Math.random() > 0.85) continue;
    walls.push({ x: 0, y, destroyed: false });
    walls.push({ x: COLS - 1, y, destroyed: false });
  }

  // Internal walls - create interesting patterns
  const pattern = [
    // Horizontal walls
    [3, 3, 4], [9, 3, 3], [15, 3, 4], [3, 7, 3], [10, 7, 4], [16, 7, 3],
    [5, 11, 3], [13, 11, 4], [3, 15, 3], [9, 15, 4], [16, 15, 3],
    [5, 19, 3], [13, 19, 4], [8, 22, 5],
    // Vertical walls
    [3, 4, 2], [3, 9, 3], [10, 4, 3], [10, 10, 3], [16, 4, 2],
    [16, 9, 3], [22, 4, 2], [22, 9, 3], [7, 12, 3], [7, 17, 3],
    [19, 12, 3], [19, 17, 3], [12, 20, 3],
    // L-shapes
    [13, 12, 2], [14, 12, 1], [20, 16, 2], [21, 16, 1],
    [5, 16, 2], [4, 16, 1], [8, 8, 2], [8, 9, 1],
  ];

  for (const [x, y, len] of pattern) {
    const isH = len <= 5; // Short = horizontal, long = vertical (heuristic)
    for (let i = 0; i < (isH ? len : 1); i++) {
      for (let j = 0; j < (isH ? 1 : len); j++) {
        const wx = x + (isH ? i : 0);
        const wy = y + (isH ? 0 : j);
        if (wx > 0 && wy > 0 && wx < COLS - 1 && wy < ROWS - 1) {
          // Don't block center player spawn area
          const cx = Math.floor(COLS / 2);
          const cy = ROWS - 3;
          if (Math.abs(wx - cx) > 2 || Math.abs(wy - cy) > 2) {
            walls.push({ x: wx, y: wy, destroyed: false });
          }
        }
      }
    }
  }

  // Random extra walls for variety
  const extraWalls = 8 + level * 3;
  for (let i = 0; i < extraWalls; i++) {
    const wx = 1 + Math.floor(Math.random() * (COLS - 2));
    const wy = 1 + Math.floor(Math.random() * (ROWS - 2));
    const cx = Math.floor(COLS / 2);
    const cy = ROWS - 3;
    if (Math.abs(wx - cx) > 2 || Math.abs(wy - cy) > 2) {
      if (!walls.some(w => w.x === wx && w.y === wy)) {
        walls.push({ x: wx, y: wy, destroyed: false });
      }
    }
  }

  // Spawn enemies
  const enemyCount = 4 + level * 2;
  for (let i = 0; i < enemyCount; i++) {
    const e = spawnEnemy();
    if (e) enemies.push(e);
  }

  // Respawn player if alive
  if (player && player.alive) {
    // Keep player where they are, just clear bullets
  }
}

// ========== AI ==========

function updateEnemyAI(enemy) {
  if (!enemy.alive) return;

  // Shoot if player is in line of sight
  if (player.alive && enemy.cooldown <= 0) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    let canShoot = false;
    let shootDir = enemy.dir;

    if (Math.abs(dx) < 0.3 && dy < 0) { canShoot = true; shootDir = 0; }
    else if (Math.abs(dx) < 0.3 && dy > 0) { canShoot = true; shootDir = 2; }
    else if (Math.abs(dy) < 0.3 && dx > 0) { canShoot = true; shootDir = 1; }
    else if (Math.abs(dy) < 0.3 && dx < 0) { canShoot = true; shootDir = 3; }

    if (canShoot) {
      // Check no wall between
      let blocked = false;
      const sx = enemy.x;
      const sy = enemy.y;
      const steps = Math.max(Math.abs(player.x - sx), Math.abs(player.y - sy));
      for (let i = 1; i < steps; i++) {
        const cx = Math.round(sx + (player.x - sx) * i / steps);
        const cy = Math.round(sy + (player.y - sy) * i / steps);
        if (walls.some(w => w.x === cx && w.y === cy && !w.destroyed)) {
          blocked = true;
          break;
        }
      }
      if (!blocked) {
        enemy.dir = shootDir;
        const bullet = enemy.shoot();
        if (bullet) bullets.push(bullet);
      }
    }
  }

  // Basic patrol/chase AI
  enemy.aiTimer--;
  if (enemy.aiTimer <= 0) {
    enemy.aiTimer = enemy.aiChangeDir + Math.random() * 30;

    if (player.alive && Math.random() < 0.55) {
      // Chase player
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        enemy.dir = dx > 0 ? 1 : 3;
      } else {
        enemy.dir = dy > 0 ? 2 : 0;
      }
    } else {
      // Random direction
      enemy.dir = Math.floor(Math.random() * 4);
    }
  }

  // Move
  const moved = enemy.move(
    [0, 1, 0, -1][enemy.dir],
    [-1, 0, 1, 0][enemy.dir]
  );
  if (!moved) {
    enemy.aiTimer = 0; // Force direction change next frame
  }
}

// ========== Game Loop ==========

function update() {
  if (gameState !== 'playing') return;

  frameCount++;

  // Player input
  if (player.alive) {
    let moved = false;
    if (keys['up']) { player.dir = 0; moved = player.move(0, -1); }
    else if (keys['down']) { player.dir = 2; moved = player.move(0, 1); }
    else if (keys['left']) { player.dir = 3; moved = player.move(-1, 0); }
    else if (keys['right']) { player.dir = 1; moved = player.move(1, 0); }

    if (keys['fire'] && player.cooldown <= 0) {
      const bullet = player.shoot();
      if (bullet) bullets.push(bullet);
    }

    player.update();
  }

  // Enemy AI
  for (const e of enemies) {
    updateEnemyAI(e);
    e.update();
  }

  // Bullets
  for (const b of bullets) b.update();
  bullets = bullets.filter(b => b.alive);

  // Particles
  for (const p of particles) p.update();
  particles = particles.filter(p => p.life > 0);

  // Power-ups
  for (const p of powerUps) p.update();
  powerUps = powerUps.filter(p => p.alive);

  // Collisions
  checkCollisions();

  // Shake decay
  if (shakeTimer > 0) shakeTimer--;

  // Spawn enemies if needed
  spawnTimer--;
  if (spawnTimer <= 0 && enemies.filter(e => e.alive).length < 2 + level) {
    spawnTimer = 180;
    const e = spawnEnemy();
    if (e) enemies.push(e);
  }

  // Check level complete
  if (enemies.filter(e => e.alive).length === 0 && spawnTimer < -120) {
    levelComplete();
  }

  // Clean up dead enemies
  enemies = enemies.filter(e => e.alive || e.flashTimer > 0);

  // Update HUD
  document.getElementById('lives').textContent = lives;
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('kills').textContent = kills;
}

function draw() {
  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, H);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(W, y * CELL);
    ctx.stroke();
  }

  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 60);
    shakeY = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 60);
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Walls
  for (const w of walls) {
    if (w.destroyed) {
      ctx.fillStyle = 'rgba(80,40,20,0.3)';
      ctx.fillRect(w.x * CELL + 2, w.y * CELL + 2, CELL - 4, CELL - 4);
    } else {
      const grad = ctx.createLinearGradient(w.x * CELL, w.y * CELL, w.x * CELL + CELL, w.y * CELL + CELL);
      grad.addColorStop(0, '#8B4513');
      grad.addColorStop(0.5, '#A0522D');
      grad.addColorStop(1, '#6B3410');
      ctx.fillStyle = grad;
      ctx.fillRect(w.x * CELL + 1, w.y * CELL + 1, CELL - 2, CELL - 2);
      ctx.strokeStyle = '#5a3020';
      ctx.lineWidth = 1;
      ctx.strokeRect(w.x * CELL + 1, w.y * CELL + 1, CELL - 2, CELL - 2);
      // Brick pattern
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(w.x * CELL + 1, w.y * CELL + CELL / 2);
      ctx.lineTo(w.x * CELL + CELL - 1, w.y * CELL + CELL / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w.x * CELL + CELL / 2, w.y * CELL + 1);
      ctx.lineTo(w.x * CELL + CELL / 2, w.y * CELL + CELL / 2);
      ctx.stroke();
    }
  }

  // Power-ups
  for (const p of powerUps) p.draw(ctx);

  // Draw player last so they're on top
  if (player) player.draw(ctx);

  // Enemies
  for (const e of enemies) e.draw(ctx);

  // Bullets
  for (const b of bullets) b.draw(ctx);

  // Particles
  for (const p of particles) p.draw(ctx);

  ctx.restore();

  // Enemy count indicator
  const aliveEnemies = enemies.filter(e => e.alive).length;
  ctx.fillStyle = '#f44';
  ctx.font = '12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`剩余敌人: ${aliveEnemies}`, W - 12, 20);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ========== Game State ==========

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('levelScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');

  score = 0;
  lives = 3;
  level = 1;
  kills = 0;
  spawnTimer = 120;
  player = new Tank(Math.floor(COLS / 2), ROWS - 3, 0, '#0a0', true);
  generateLevel();
  gameState = 'playing';
}

function restartGame() {
  startGame();
}

function levelComplete() {
  gameState = 'levelComplete';
  score += 500;
  level++;
  document.getElementById('levelTitle').textContent = `第 ${level} 关`;
  document.getElementById('levelScreen').classList.remove('hidden');
}

function startLevel() {
  document.getElementById('levelScreen').classList.add('hidden');
  // Keep player position, reset enemies
  bullets = [];
  particles = [];
  powerUps = [];
  enemies = [];
  spawnTimer = 120;
  player.alive = true;
  player.hp = 3;
  player.invincible = 90;
  player.cooldown = 0;
  generateLevel();
  gameState = 'playing';
}

function gameOver(won) {
  gameState = 'gameOver';
  const title = document.getElementById('gameOverTitle');
  title.textContent = won ? '🎉 恭喜通关!' : '💥 游戏结束';
  title.style.color = won ? '#ff0' : '#f44';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalKills').textContent = kills;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

// ========== Event Listeners ==========

document.addEventListener('keydown', (e) => {
  const action = KEY_MAP[e.key];
  if (action) {
    e.preventDefault();
    keys[action] = true;
  }
});

document.addEventListener('keyup', (e) => {
  const action = KEY_MAP[e.key];
  if (action) {
    e.preventDefault();
    keys[action] = false;
  }
});

// Mobile touch controls
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  // Right half = fire
  if (tx > W / 2) {
    keys['fire'] = true;
  } else {
    // Left half = movement based on position
    const cx = W / 4;
    const cy = H / 2;
    const dx = tx - cx;
    const dy = ty - cy;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      keys[dx > 0 ? 'right' : 'left'] = true;
    } else {
      keys[dy > 0 ? 'down' : 'up'] = true;
    }
  }
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  keys['up'] = keys['down'] = keys['left'] = keys['right'] = keys['fire'] = false;
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  // Recalculate on move
  keys['up'] = keys['down'] = keys['left'] = keys['right'] = false;
  if (e.touches.length === 0) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;
  if (tx > W / 2) {
    keys['fire'] = true;
  } else {
    const cx = W / 4;
    const cy = H / 2;
    const dx = tx - cx;
    const dy = ty - cy;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      keys[dx > 0 ? 'right' : 'left'] = true;
    } else {
      keys[dy > 0 ? 'down' : 'up'] = true;
    }
  }
});

// ========== Init ==========

// Start with player at center-bottom
player = new Tank(Math.floor(COLS / 2), ROWS - 3, 0, '#0a0', true);
// Pre-generate a level for the background
generateLevel();

document.getElementById('hud').classList.add('hidden');
gameLoop();
</script>
